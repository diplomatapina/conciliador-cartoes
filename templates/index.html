<!DOCTYPE html>
<html>

<head>
    <title>Conciliação de Cartões</title>
</head>

<body>

<h1>Sistema de Conciliação</h1>

<form action="/conciliar" method="post" enctype="multipart/form-data">

<label>Selecione a loja:</label>
<select name="loja">
{% for loja in lojas %}
<option value="{{ loja }}">{{ loja }}</option>
{% endfor %}
</select>

<br><br>

<label>Upload relatórios TEF (Excel):</label><br>
<input type="file" name="tef_files" accept=".xlsx,.xls" multiple>

<br><br>

<label>Upload relatórios Maquineta (PDF):</label><br>
<input type="file" name="maquineta_files" accept=".pdf" multiple>

<br><br>

<label>Upload extrato bancário (CSV):</label><br>
<input type="file" name="extrato_file" accept=".csv">

<br><br>

<button type="submit">Conciliar</button>

</form>

</body>
</html>
