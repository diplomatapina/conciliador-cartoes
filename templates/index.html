<!DOCTYPE html>

<html>

<head>
    <title>Conciliação de Cartões</title>
</head>

<body>

<h1>Sistema de Conciliação</h1>

<form action="/conciliar" method="post" enctype="multipart/form-data">

<label>Selecione a loja:</label><br> <select name="loja">
{% for loja in lojas %}

<option value="{{ loja }}">{{ loja }}</option>
{% endfor %}
</select>

<br><br>

<label>Upload relatório TEF (Excel):</label><br> <input type="file" name="tef_file" accept=".xlsx,.xls">

<br><br>

<label>Upload relatório Maquineta (PDF):</label><br> <input type="file" name="maquineta_file" accept=".pdf">

<br><br>

<label>Upload extrato bancário (CSV):</label><br> <input type="file" name="extrato_file" accept=".csv">

<br><br>

<button type="submit">Conciliar</button>

</form>

</body>
</html>
